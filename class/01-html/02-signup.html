<!DOCTYPE html>
<html lang="ko">
  <head>
    <title>회원가입</title>
    <link href="./02-signup.css" rel="stylesheet" />
  </head>
  <body>
    <div id="pb">
      <div id="info">
        <h2>회원 가입을 위해<br />정보를 입력해주세요</h2>
      </div>
      <div>.이메일</div>
      <br />
      <input id="email" type="text" /><br /><br />
      <div>.이름</div>
      <br />
      <input class="ib" type="text" /><br /><br />
      <div>.비밀번호</div>
      <br />
      <input class="ib" type="password" /><br /><br />
      <div>.비밀번호 확인</div>
      <br />
      <input class="ib" type="password" /><br /><br />
      <div class="radioGender">
        <div class="radiofemale"><input type="radio" name="gender" /> 여성</div>
        <div class="radiomale"><input type="radio" name="gender" /> 남성</div>
        <br /><br />
      </div>
      <p class="chkInfo">
        <input type="checkbox" /> 이용약관 개인정 수집 및 업로드에 동의합니다.
      </p>
      <hr />
      <div class="btnWrap"><button class="btn">가입하기</button></div>
      <!-- <input type="button" value="이용약관 어쩌구 동의합니다." /> -->
    </div>
  </body>
</html>
